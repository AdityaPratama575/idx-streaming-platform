name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test-producer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          pip install -r requirements-producer.txt
          pip install -r requirements-test.txt
      - name: Run producer tests
        run: pytest tests/test_producer.py -v --cov=producer --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true

  test-spark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: temurin
      - name: Install dependencies
        run: |
          pip install -r requirements-spark.txt
          pip install -r requirements-test.txt
          pip install pyspark==3.4.4
      - name: Run spark processor tests
        run: pytest tests/test_spark_processor.py -v --cov=spark_processor --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
