version: 2

models:
  - name: stg_idx_sector_ticks
    description: "Staging layer for IDX stock ticks. Renames columns, casts types, filters data < 90 days."
    columns:
      - name: ticker
        tests:
          - not_null
      - name: sector
        tests:
          - not_null
      - name: timestamp
        tests:
          - not_null
      - name: close
        tests:
          - not_null
      - name: volume
        tests:
          - not_null
      - name: date_id
        tests:
          - not_null
      - name: ticker
        tests:
          - unique:
              # Composite unique with timestamp (soft dependency — dbt_utils.unique_combination_of_columns)
              column_name: "ticker || '-' || CAST(timestamp AS STRING)"
      - name: sector
        tests:
          - accepted_values:
              values:
                - Energy
                - Basic Materials
                - Consumer Cyclicals
                - Consumer Non-Cyclicals
                - Healthcare
                - Properties & Real Estate
                - Technology
                - Infrastructures
                - Transportation & Logistic
                - Financials
                - Industrial
      - name: close
        tests:
          - dbt_utils.expression_is_true:
              expression: "close > 0"
      - name: volume
        tests:
          - dbt_utils.expression_is_true:
              expression: "volume >= 0"
