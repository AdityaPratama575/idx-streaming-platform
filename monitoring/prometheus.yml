scrape_configs:
  - job_name: "producer"
    static_configs:
      - targets: ["idx-producer:8000"]
  - job_name: "spark"
    metrics_path: "/metrics/prometheus"
    static_configs:
      - targets: ["idx-spark-master:8080"]
  - job_name: "kafka"
    static_configs:
      - targets: ["idx-kafka:9092"]
